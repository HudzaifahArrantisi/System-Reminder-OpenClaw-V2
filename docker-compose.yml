version: "3.8"

services:
  # ── Backend Golang ──
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - app-network

  # ── OpenClaw Automation ──
  openclaw:
    build: ./openclaw
    env_file: .env
    networks:
      - app-network

  # ── Frontend React ──
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
